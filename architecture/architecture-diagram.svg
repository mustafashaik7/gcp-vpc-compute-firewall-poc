<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">GCP VPC Networking and Compute Engine Firewall PoC</text>
  <text x="600" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Custom VPC, subnet, VM internal/external IPs, and targeted firewall rules</text>

  <rect x="60" y="125" width="1080" height="560" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="160" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Custom VPC: vpc-lab-network</text>

  <rect x="105" y="190" width="990" height="430" rx="20" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="130" y="225" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">Custom Subnet: subnet-lab-us-central1</text>
  <text x="130" y="252" font-family="Arial, sans-serif" font-size="16" fill="#475569">CIDR: 10.10.0.0/24 | Region: us-central1</text>

  <rect x="445" y="300" width="280" height="150" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="585" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#065f46">public-test-vm</text>
  <text x="585" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#047857">External IP: Yes</text>
  <text x="585" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#047857">Internal IP: 10.10.0.x</text>
  <text x="585" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#065f46">Tags: public-vm, ssh-enabled, vpc-lab</text>

  <rect x="795" y="300" width="280" height="150" rx="16" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="935" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#854d0e">private-test-vm</text>
  <text x="935" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a16207">External IP: No</text>
  <text x="935" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a16207">Internal IP: 10.10.0.x</text>
  <text x="935" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#854d0e">Tags: private-vm, vpc-lab</text>

  <rect x="95" y="300" width="260" height="150" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="225" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3730a3">Admin Workstation</text>
  <text x="225" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4338ca">Your public IP /32</text>
  <text x="225" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4338ca">SSH + ICMP tests</text>

  <line x1="355" y1="375" x2="445" y2="375" stroke="#4f46e5" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3730a3">SSH tcp/22</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3730a3">ICMP to public VM</text>

  <line x1="725" y1="375" x2="795" y2="375" stroke="#059669" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="760" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#065f46">Internal IP</text>
  <text x="760" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#065f46">ICMP + tcp/22</text>

  <rect x="140" y="500" width="270" height="88" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="275" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9a3412">allow-ssh-from-my-ip</text>
  <text x="275" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9a3412">Source: source_ip_cidr</text>
  <text x="275" y="577" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9a3412">Target: ssh-enabled | TCP 22</text>

  <rect x="465" y="500" width="270" height="88" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">allow-internal-icmp</text>
  <text x="600" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">Source: 10.10.0.0/24</text>
  <text x="600" y="577" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">Target: vpc-lab | ICMP</text>

  <rect x="790" y="500" width="270" height="88" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="925" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#075985">allow-internal-ssh</text>
  <text x="925" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#075985">Source: 10.10.0.0/24</text>
  <text x="925" y="577" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#075985">Target: vpc-lab | TCP 22</text>

  <rect x="415" y="635" width="370" height="70" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="600" y="664" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9d174d">allow-external-icmp-public-vm</text>
  <text x="600" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9d174d">Source: source_ip_cidr by default | Target: public-vm | ICMP</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
